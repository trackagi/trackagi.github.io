name: Bug Report
description: Report a problem with the site or build tooling
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `./run.sh build`
        2. Open http://localhost:8000
        3. Click on...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser / Environment
      placeholder: "e.g., Chrome 120, Python 3.11, macOS 14"
